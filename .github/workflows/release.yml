name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Plan Release
        id: plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run release:plan

      - name: Skip Release
        if: steps.plan.outputs.should_release != 'true'
        run: 'echo "Skipping release: ${{ steps.plan.outputs.reason }}"'

      - name: Stamp Release Version
        if: steps.plan.outputs.should_release == 'true'
        run: npm version --no-git-tag-version ${{ steps.plan.outputs.version }}

      - name: Check
        if: steps.plan.outputs.should_release == 'true'
        run: npm run check

      - name: Test
        if: steps.plan.outputs.should_release == 'true'
        run: npm test

      - name: Build
        if: steps.plan.outputs.should_release == 'true'
        run: npm run build

      - name: Publish to npm
        if: steps.plan.outputs.should_release == 'true'
        run: npm publish --provenance

      - name: Create Git Tag
        if: steps.plan.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.plan.outputs.tag }}"
          git push origin "refs/tags/${{ steps.plan.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.plan.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: 'gh release create "${{ steps.plan.outputs.tag }}" --title "${{ steps.plan.outputs.tag }}" --generate-notes'
